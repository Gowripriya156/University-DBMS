<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sections - UniDBMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="js/app.js"></script>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden font-inter text-gray-800">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl z-20">
        <div class="h-16 flex items-center px-6 bg-slate-950 border-b border-slate-800">
            <i class="fa-solid fa-graduation-cap text-blue-400 text-2xl mr-3"></i>
            <span class="text-xl font-bold tracking-wider">UniDBMS</span>
        </div>
        <nav class="flex-1 overflow-y-auto py-4 fancy-scrollbar">
            <ul class="space-y-1">
                <li><a href="index.html" class="nav-item flex items-center px-6 py-3 hover:bg-slate-800 transition-colors"><i class="fa-solid fa-chart-pie w-6"></i> Dashboard</a></li>
                <li class="px-6 py-2 text-xs font-semibold text-slate-400 uppercase tracking-wider mt-4">Institutions</li>
                <li><a href="colleges.html" class="nav-item flex items-center px-6 py-3 hover:bg-slate-800 transition-colors"><i class="fa-solid fa-building-columns w-6"></i> Colleges</a></li>
                <li><a href="departments.html" class="nav-item flex items-center px-6 py-3 hover:bg-slate-800 transition-colors"><i class="fa-solid fa-sitemap w-6"></i> Departments</a></li>
                <li class="px-6 py-2 text-xs font-semibold text-slate-400 uppercase tracking-wider mt-4">Academics</li>
                <li><a href="courses.html" class="nav-item flex items-center px-6 py-3 hover:bg-slate-800 transition-colors"><i class="fa-solid fa-book w-6"></i> Courses</a></li>
                <li><a href="sections.html" class="nav-item active flex items-center px-6 py-3 bg-slate-800 transition-colors"><i class="fa-solid fa-chalkboard w-6"></i> Sections</a></li>
                <li class="px-6 py-2 text-xs font-semibold text-slate-400 uppercase tracking-wider mt-4">People</li>
                <li><a href="instructors.html" class="nav-item flex items-center px-6 py-3 hover:bg-slate-800 transition-colors"><i class="fa-solid fa-chalkboard-user w-6"></i> Instructors</a></li>
                <li><a href="students.html" class="nav-item flex items-center px-6 py-3 hover:bg-slate-800 transition-colors"><i class="fa-solid fa-user-graduate w-6"></i> Students</a></li>
                <li class="px-6 py-2 text-xs font-semibold text-slate-400 uppercase tracking-wider mt-4">Records</li>
                <li><a href="enrollments.html" class="nav-item flex items-center px-6 py-3 hover:bg-slate-800 transition-colors"><i class="fa-solid fa-file-signature w-6"></i> Enrollments & Grades</a></li>
                <li class="px-6 py-2 text-xs font-semibold text-slate-400 uppercase tracking-wider mt-4">Analytics</li>
                <li><a href="reports.html" class="nav-item flex items-center px-6 py-3 hover:bg-slate-800 transition-colors"><i class="fa-solid fa-file-invoice w-6"></i> Standard Reports</a></li>
                <li><a href="queries.html" class="nav-item flex items-center px-6 py-3 hover:bg-slate-800 transition-colors"><i class="fa-solid fa-magnifying-glass-chart w-6"></i> Advanced Queries</a></li>
            </ul>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10 border-b border-gray-100">
            <h1 class="text-2xl font-bold text-gray-800">Course Offerings (Sections)</h1>
            <div class="flex space-x-3">
                <select id="filter-term" class="form-input py-1 text-sm max-w-[150px] bg-gray-50" onchange="renderTable()">
                    <option value="all">All Terms</option>
                </select>
                <select id="filter-ccode" class="form-input py-1 text-sm max-w-[150px] bg-gray-50" onchange="renderTable()">
                    <option value="all">All Courses</option>
                </select>
                <button onclick="openAddSectionModal()" class="btn-primary flex items-center">
                    <i class="fa-solid fa-plus mr-2"></i> Add Section
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 bg-slate-50/50 relative">
            <div id="loading-spinner" class="hidden absolute inset-0 bg-white/60 backdrop-blur-sm z-50 flex items-center justify-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            </div>

            <!-- Enrolled Students Quick View -->
            <div id="roster-view" class="hidden bg-white rounded-xl shadow-lg border border-gray-200 mb-6 p-6 animate-fade-in relative z-10 transition-all">
                <button onclick="document.getElementById('roster-view').classList.add('hidden')" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 transition-colors"><i class="fa-solid fa-xmark text-xl bg-gray-100 rounded-full w-8 h-8 flex justify-center items-center"></i></button>
                <div class="flex items-center justify-between border-b pb-4 mb-4">
                    <div>
                        <h2 class="text-2xl font-bold text-gray-800" id="roster-title"></h2>
                        <span class="text-sm font-semibold tracking-wide text-gray-500" id="roster-subtitle"></span>
                    </div>
                </div>
                <div id="roster-table-container"></div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 animate-fade-in">
                <div id="sections-table-container"></div>
            </div>
        </div>
    </main>

    <!-- Global Modal Container -->
    <div id="modal-container" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl transform scale-95 transition-transform duration-300 p-6 overflow-y-auto max-h-[90vh] fancy-scrollbar" id="modal-content"></div>
    </div>
    
    <div id="confirm-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[110] flex items-center justify-center">
        <!-- standard confirm modal internal HTML -->
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 text-center">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
                <i class="fa-solid fa-triangle-exclamation text-red-600 text-xl"></i>
            </div>
            <h3 class="text-lg leading-6 font-medium text-gray-900 mb-2" id="confirm-title">Confirm Action</h3>
            <p class="text-sm text-gray-500 mb-6" id="confirm-message">Are you sure?</p>
            <div class="flex justify-center space-x-3">
                <button type="button" class="btn-secondary px-4 py-2" id="confirm-cancel">Cancel</button>
                <button type="button" class="btn-danger px-4 py-2" id="confirm-ok">Delete</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/sections.js"></script>
</body>
</html>
